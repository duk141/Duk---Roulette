<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Xỉu MD5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap');
        
        :root {
            --primary: #8e2de2;
            --secondary: #4a00e0;
            --danger: #ff416c;
            --success: #00b09b;
            --warning: #ffb347;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --card-bg: rgba(30, 30, 46, 0.9);
            --glow: 0 0 20px 5px rgba(142, 45, 226, 0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background: url('https://i.postimg.cc/T35VPGmh/2d5ab14f89532f6529fb2cf0f0cf4f3c.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(18, 18, 18, 0.95), rgba(42, 13, 74, 0.9));
            z-index: -1;
        }
        
        .header {
            text-align: center;
            padding: 22px 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin-bottom: 30px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            background: linear-gradient(to right, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.05);
        }
        
        .back-btn i {
            margin-right: 6px;
            font-size: 0.9rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            animation: fadeIn 0.8s ease;
        }
        
        .page-info {
            text-align: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        
        .page-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--light);
            letter-spacing: 0.5px;
            position: relative;
            padding-bottom: 15px;
        }
        
        .page-info h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border-radius: 3px;
        }
        
        .page-info p {
            color: #ddd;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
        }
        
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--glow);
            border-color: rgba(142, 45, 226, 0.5);
        }
        
        .game-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid rgba(142, 45, 226, 0.3);
        }
        
        .game-info {
            padding: 25px;
            text-align: center;
        }
        
        .game-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 0.5px;
        }
        
        .play-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(142, 45, 226, 0.5);
            letter-spacing: 0.5px;
        }
        
        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(142, 45, 226, 0.7);
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 1.5rem;
        }
        
        .error-message {
            background: rgba(255, 65, 108, 0.2);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .games-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .game-card {
                max-width: 350px;
                margin: 0 auto;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="authLoading" class="loading">
        <div>Đang xác thực...</div>
    </div>
    
    <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
    </div>
    
    <div id="mainContent" style="display: none;">
        <div class="header">
            <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> QUAY LẠI</button>
            <h1>TÀI XỈU MD5</h1>
        </div>
        
        <div class="container">
            <div class="page-info">
                <h2>Chọn Nhà Cái MD5</h2>
                <p>Vui lòng chọn nhà cái bạn muốn chơi Tài Xỉu MD5. Mỗi nhà cái có tỷ lệ và cách chơi khác nhau, hãy chọn nhà cái phù hợp với bạn.</p>
            </div>
            
            <div class="games-container">
                <div class="game-card">
                    <img src="https://i.postimg.cc/L6LQBFgT/IMG-7875.jpg" alt="Hit Club" class="game-image">
                    <div class="game-info">
                        <h3 class="game-title">Hit Club</h3>
                        <a href="hit.html" class="play-btn">Vào Game</a>
                    </div>
                </div>
                
                <div class="game-card">
                    <img src="https://i.postimg.cc/ZKdxtPTK/IMG-7873.jpg" alt="B52" class="game-image">
                    <div class="game-info">
                        <h3 class="game-title">B52 Club</h3>
                        <a href="b52.html" class="play-btn">Vào Game</a>
                    </div>
                </div>
                
                <div class="game-card">
                    <img src="https://i.postimg.cc/3xHPtTTR/t-i-xu-ng.jpg" alt="Luckywin" class="game-image">
                    <div class="game-info">
                        <h3 class="game-title">Luckywin</h3>
                        <a href="luck.html" class="play-btn">Vào Game</a>
                    </div>
                </div>
                
                <div class="game-card">
                    <img src="https://i.postimg.cc/HxLz6Snj/logosumclub2.webp" alt="SUMCLUB" class="game-image">
                    <div class="game-info">
                        <h3 class="game-title">SUMCLUB</h3>
                        <a href="sum.html" class="play-btn">Vào Game</a>
                    </div>
                </div>
                
                <div class="game-card">
                    <img src="https://i.postimg.cc/wMCkTgVs/xocdia88.png" alt="XD88" class="game-image">
                    <div class="game-info">
                        <h3 class="game-title">XD88</h3>
                        <a href="xd.html" class="play-btn">Vào Game</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Hàm lấy tham số từ URL
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    // Lấy key từ URL hoặc localStorage (nếu có)
        let accessKey = getQueryParam('key') || localStorage.getItem('accessKey');
        
        // Nếu không có key, chuyển hướng về trang đăng nhập
        if (!accessKey) {
            window.location.href = 'login.html';
        } else {
            // Lưu key vào localStorage để sử dụng sau
            localStorage.setItem('accessKey', accessKey);
            
            // Gửi yêu cầu xác thực đến server
            fetch('check_key.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'key=' + encodeURIComponent(accessKey)
            })
            .then(response => response.json())
            .then(data => {
                // Ẩn loading
                document.getElementById('loading').style.display = 'none';
                
                if (data.valid) {
                    // Hiển thị nội dung trang chính
                    document.querySelector('.container').style.display = 'block';
                    
                    // Cập nhật thông tin người dùng nếu có
                    if (data.username) {
                        const welcomeMessage = document.querySelector('.welcome-message p:first-child');
                        welcomeMessage.textContent = `Chào mừng ${data.username} đến với hệ thống trò chơi đẳng cấp`;
                    }
                } else {
                    // Key không hợp lệ, xóa key và chuyển hướng về trang đăng nhập
                    localStorage.removeItem('accessKey');
                    alert('Key truy cập không hợp lệ. Vui lòng đăng nhập lại.');
                    window.location.href = 'login.html';
                }
            })
            .catch(error => {
                console.error('Lỗi:', error);
                document.getElementById('loading').style.display = 'none';
                alert('Có lỗi xảy ra khi xác thực. Vui lòng thử lại.');
                window.location.href = 'login.html';
            });
        }

    function showError(message) {
        const errorElement = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorElement.style.display = 'block';
    }
    </script>
</body>
</html>
