<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMCLUB - Tài Xỉu MD5</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #gameFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        
        #robotContainer {
            position: fixed;
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            z-index: 9999;
            cursor: move;
            touch-action: none;
        }

        #robotInner {
            transform: rotate(90deg);
            transform-origin: left center;
            display: flex;
            align-items: center;
        }

        #robotIcon {
            width: 120px;
            height: 120px;
            margin-right: 15px;
            pointer-events: none;
            border: none;
            box-shadow: none;
        }

        #robotText {
            background: rgba(147, 39, 143, 0.7);
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.4;
            box-shadow: 0 3px 10px rgba(199, 21, 133, 0.5);
            white-space: nowrap;
            max-width: 280px;
            position: relative;
            border: 1px solid rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #line1, #line2 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        strong {
            font-weight: bold;
        }

        #loadingIndicator {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(147, 39, 143, 0.9);
            color: #ffb6c1;
            padding: 20px 30px;
            border-radius: 12px;
            z-index: 1002;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 182, 193, 0.5);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            font-size: 18px;
            text-align: center;
        }

        .tai {
            color: #98fb98;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(152, 251, 152, 0.7);
        }

        .xiu {
            color: #ff6b6b;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 107, 107, 0.7);
        }
        
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: rgba(255, 0, 0, 0.9);
            transform: scale(1.1);
        }
        
        .auth-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            color: white;
            font-size: 1.5rem;
            flex-direction: column;
        }
        
        .error-message {
            background: rgba(255, 65, 108, 0.2);
            border: 1px solid #ff416c;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10002;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="authLoading" class="auth-loading">
        <div>Đang xác thực...</div>
    </div>
    
    <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
    </div>
    
    <div id="mainContent" style="display: none;">
        <iframe id="gameFrame" src="https://play.sum34.club/?domain=sum34.club&packname=home" allowfullscreen></iframe>
        
        <div id="robotContainer">
            <div id="robotInner">
                <img id="robotIcon" src="https://i.postimg.cc/rwkZQhxp/Robot.gif" alt="Robot">
                <div id="robotText">
                    <div id="line1">#Phiên: Loading...</div>
                    <div id="line2">Dự đoán: Loading...</div>
                </div>
            </div>
        </div>
        
        <div id="loadingIndicator">Đang cập nhật dự đoán...</div>
        
        <button class="close-btn" onclick="window.history.back()">×</button>
    </div>

    <script>
    // Hàm lấy tham số từ URL
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    // Lấy key từ URL hoặc localStorage (nếu có)
    let accessKey = getQueryParam('key') || localStorage.getItem('accessKey');
    
    // Nếu không có key, chuyển hướng về trang đăng nhập
    if (!accessKey) {
        window.location.href = 'login.html';
    } else {
        // Lưu key vào localStorage để sử dụng sau
        localStorage.setItem('accessKey', accessKey);
        
        // Gửi yêu cầu xác thực đến server
        fetch('check_key.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: 'key=' + encodeURIComponent(accessKey)
        })
        .then(response => response.json())
        .then(data => {
            // Ẩn loading xác thực
            document.getElementById('authLoading').style.display = 'none';
            
            if (data.success) {
                // Hiển thị nội dung chính
                document.getElementById('mainContent').style.display = 'block';
                
                // Khởi tạo ứng dụng
                initApp();
            } else {
                // Xóa key không hợp lệ
                localStorage.removeItem('accessKey');
                
                // Hiển thị thông báo lỗi
                showError('Key truy cập không hợp lệ. Vui lòng đăng nhập lại.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        })
        .catch(error => {
            console.error('Lỗi xác thực:', error);
            document.getElementById('authLoading').style.display = 'none';
            showError('Có lỗi xảy ra khi xác thực. Vui lòng thử lại.');
        });
    }

    function showError(message) {
        const errorElement = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorElement.style.display = 'block';
    }

    function initApp() {
        // Make robot draggable
        const robotContainer = document.getElementById('robotContainer');
        let isDragging = false;
        let offsetX, offsetY;

        robotContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - robotContainer.getBoundingClientRect().left;
            offsetY = e.clientY - robotContainer.getBoundingClientRect().top;
            robotContainer.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const x = e.clientX - offsetX;
            const y = e.clientY - offsetY;
            
            robotContainer.style.left = `${x}px`;
            robotContainer.style.top = `${y}px`;
            robotContainer.style.transform = 'none';
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            robotContainer.style.cursor = 'move';
        });

        // Touch support for mobile devices
        robotContainer.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            offsetX = touch.clientX - robotContainer.getBoundingClientRect().left;
            offsetY = touch.clientY - robotContainer.getBoundingClientRect().top;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const x = touch.clientX - offsetX;
            const y = touch.clientY - offsetY;
            
            robotContainer.style.left = `${x}px`;
            robotContainer.style.top = `${y}px`;
            robotContainer.style.transform = 'none';
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Fetch data from API
        async function fetchData() {
            try {
                document.getElementById('loadingIndicator').style.display = 'block';
                
                const response = await fetch('apimd5.php?source=sumclub');
                const data = await response.json();
                
                // Update robot text
                document.getElementById('line1').innerHTML = `#Phiên: <strong>${data.Phien + 1}</strong>`;
                document.getElementById('line2').innerHTML = `Dự đoán: <span class="${data.Du_doan === 'Tài' ? 'tai' : 'xiu'}">${data.Du_doan}</span>`;
                
                document.getElementById('loadingIndicator').style.display = 'none';
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('line1').innerHTML = '#Phiên: Lỗi';
                document.getElementById('line2').innerHTML = 'Dự đoán: Lỗi kết nối';
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        // Fetch data every 10 seconds
        fetchData();
        setInterval(fetchData, 10000);
    }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
