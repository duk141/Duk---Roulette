<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --accent-color: #48b1bf;
            --text-color: #2b2d42;
            --light-color: #f8f9fa;
            --error-color: #ff416c;
            --success-color: #4cc9f0;
            --gold-color: #ffd700;
            --platinum-color: #e5e4e2;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .vip-badge {
            position: absolute;
            top: -15px;
            right: 30px;
            background: linear-gradient(135deg, var(--gold-color), var(--platinum-color));
            color: var(--text-color);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 2;
            transform: rotate(5deg);
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .login-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxkZWZzPjxwYXR0ZXJuIGlkPSJwYXR0ZXJuIiB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHBhdHRlcm5Vbml0cz0idXNlclNwYWNlT25Vc2UiIHBhdHRlcm5UcmFuc2Zvcm09InJvdGF0ZSg0NSkiPjxyZWN0IHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjA1KSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3QgZmlsbD0idXJsKCNwYXR0ZXJuKSIgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIvPjwvc3ZnPg==');
            opacity: 0.3;
        }
        
        .login-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
            position: relative;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .login-header p {
            font-size: 16px;
            opacity: 0.9;
            position: relative;
        }
        
        .login-form {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-color);
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        
        .input-field {
            position: relative;
        }
        
        .input-field input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            background-color: rgba(245, 247, 250, 0.8);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .input-field input:focus {
            border-color: var(--accent-color);
            outline: none;
            background-color: white;
            box-shadow: 0 5px 15px rgba(72, 149, 239, 0.2);
            transform: translateY(-2px);
        }
        
        .input-field i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .input-field input:focus + i {
            color: var(--accent-color);
            transform: translateY(-50%) scale(1.1);
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            margin-top: 15px;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        .submit-btn:hover {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        .submit-btn i {
            margin-right: 10px;
            transition: all 0.3s;
        }
        
        .submit-btn:hover i {
            transform: translateX(5px);
        }
        
        .error-message {
            color: var(--error-color);
            font-size: 14px;
            margin-top: 8px;
            display: none;
            font-weight: 600;
            animation: shake 0.5s;
        }
        
        .contact-admin {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .contact-admin p {
            color: #6c757d;
            margin-bottom: 20px;
            font-size: 15px;
            font-weight: 500;
        }
        
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0088cc, #00aced);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        
        .telegram-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        .telegram-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.4);
        }
        
        .telegram-btn:hover::before {
            left: 100%;
        }
        
        .telegram-btn i {
            margin-right: 10px;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .telegram-btn:hover i {
            transform: scale(1.1);
        }
        
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        /* Responsive */
        @media (max-width: 576px) {
            .login-container {
                border-radius: 15px;
            }
            
            .vip-badge {
                right: 20px;
                font-size: 12px;
                padding: 6px 15px;
            }
            
            .login-header {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 26px;
            }
            
            .login-form {
                padding: 30px 25px;
            }
            
            .input-field input {
                padding: 15px 15px 15px 45px;
            }
            
            .submit-btn {
                padding: 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element" style="width: 100px; height: 100px; top: 10%; left: 5%; animation-delay: 0s;"></div>
        <div class="floating-element" style="width: 150px; height: 150px; top: 60%; left: 80%; animation-delay: 2s;"></div>
        <div class="floating-element" style="width: 80px; height: 80px; top: 80%; left: 10%; animation-delay: 4s;"></div>
        <div class="floating-element" style="width: 120px; height: 120px; top: 30%; left: 70%; animation-delay: 6s;"></div>
    </div>
    
    <div class="login-container">
        <div class="vip-badge">VIP ACCESS</div>
        
        <div class="login-header">
            <h1>ĐĂNG NHẬP HỆ THỐNG</h1>
            <p>Vui lòng nhập mã truy cập VIP để tiếp tục</p>
        </div>
        
        <div class="login-form">
            <form id="keyForm">
                <div class="form-group">
                    <label for="accessKey">MÃ TRUY CẬP VIP</label>
                    <div class="input-field">
                        <input type="text" id="accessKey" placeholder="Nhập mã truy cập của bạn" required>
                        <i class="fas fa-key"></i>
                    </div>
                    <div id="errorMessage" class="error-message"></div>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i> XÁC NHẬN
                </button>
            </form>
            
            <div class="contact-admin">
                <p>Nếu bạn chưa có mã truy cập VIP</p>
                <a href="https://t.me/Lykhoian" target="_blank" class="telegram-btn">
                    <i class="fab fa-telegram"></i> LIÊN HỆ ADMIN
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Khởi tạo particles.js
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('floating-elements', {
                    "particles": {
                        "number": {
                            "value": 30,
                            "density": {
                                "enable": true,
                                "value_area": 800
                            }
                        },
                        "color": {
                            "value": "#ffffff"
                        },
                        "shape": {
                            "type": "circle",
                            "stroke": {
                                "width": 0,
                                "color": "#000000"
                            },
                            "polygon": {
                                "nb_sides": 5
                            }
                        },
                        "opacity": {
                            "value": 0.3,
                            "random": true,
                            "anim": {
                                "enable": false,
                                "speed": 1,
                                "opacity_min": 0.1,
                                "sync": false
                            }
                        },
                        "size": {
                            "value": 5,
                            "random": true,
                            "anim": {
                                "enable": false,
                                "speed": 40,
                                "size_min": 0.1,
                                "sync": false
                            }
                        },
                        "line_linked": {
                            "enable": false,
                            "distance": 150,
                            "color": "#ffffff",
                            "opacity": 0.4,
                            "width": 1
                        },
                        "move": {
                            "enable": true,
                            "speed": 2,
                            "direction": "none",
                            "random": true,
                            "straight": false,
                            "out_mode": "out",
                            "bounce": false,
                            "attract": {
                                "enable": false,
                                "rotateX": 600,
                                "rotateY": 1200
                            }
                        }
                    },
                    "interactivity": {
                        "detect_on": "canvas",
                        "events": {
                            "onhover": {
                                "enable": true,
                                "mode": "bubble"
                            },
                            "onclick": {
                                "enable": true,
                                "mode": "push"
                            },
                            "resize": true
                        },
                        "modes": {
                            "bubble": {
                                "distance": 200,
                                "size": 6,
                                "duration": 2,
                                "opacity": 0.8,
                                "speed": 3
                            },
                            "push": {
                                "particles_nb": 4
                            }
                        }
                    },
                    "retina_detect": true
                });
            }
            
            // Hiệu ứng khi trang load xong
            setTimeout(() => {
                document.querySelector('.login-container').style.opacity = '1';
            }, 100);
        });
        
        document.getElementById('keyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const key = document.getElementById('accessKey').value;
            const errorElement = document.getElementById('errorMessage');
            
            // Ẩn thông báo lỗi trước khi kiểm tra
            errorElement.style.display = 'none';
            
            // Kiểm tra key với danh sách key hợp lệ
            fetch('check_key.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'key=' + encodeURIComponent(key)
            })
            .then(response => response.json())
            .then(data => {
                if (data.valid) {
                    // Lưu key vào localStorage
                    localStorage.setItem('accessKey', key);
                    // Thêm hiệu ứng trước khi chuyển trang
                    document.querySelector('.login-container').style.animation = 'fadeIn 0.5s ease-in-out reverse';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    // Hiển thị thông báo lỗi
                    errorElement.textContent = 'Mã truy cập không hợp lệ! Vui lòng thử lại hoặc liên hệ admin.';
                    errorElement.style.display = 'block';
                    // Hiệu ứng shake khi nhập sai
                    document.getElementById('accessKey').style.borderColor = 'var(--error-color)';
                    document.getElementById('accessKey').style.transform = 'translateX(-5px)';
                    setTimeout(() => {
                        document.getElementById('accessKey').style.borderColor = 'rgba(0, 0, 0, 0.1)';
                        document.getElementById('accessKey').style.transform = 'translateX(0)';
                    }, 500);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                errorElement.textContent = 'Có lỗi xảy ra khi kết nối. Vui lòng thử lại sau!';
                errorElement.style.display = 'block';
            });
        });
    </script>
</body>
</html>
