<!DOCTYPE html>
<html lang="vi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Sicbo AI Learning</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}

/* BODY FULL SCREEN */
body{
    display:flex;
    justify-content:center;
    align-items:center; /* center thật */

    min-height:100vh; /* ← FIX dấu ; */
    overflow-x:hidden;

    background:
        radial-gradient(circle at 30% 20%, #00ffd522, transparent 40%),
        radial-gradient(circle at 70% 80%, #00ff9c22, transparent 40%),
        #020617;

    color:#fff;
    font-family:sans-serif;
}

/* APP WRAPPER */
.app{
    width:100%;
    max-width:480px;

    /* ❌ bỏ dòng này */
    /* min-height:100vh; */

    padding:12px 10px 30px;
    box-sizing:border-box;
}

/* neon glow */
.neon{
    text-shadow: 0 0 8px #00ffcc, 0 0 16px #00ffcc;
}

/* glass box */
.box{
    position: relative;
    background: rgba(20,25,40,0.55);
    border-radius: 18px;
    padding: 14px;
    margin: 12px 0;
    width: 100%;

    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(0,255,200,0.25);

    box-shadow:
        0 0 25px rgba(0,255,200,0.25),
        inset 0 0 12px rgba(0,255,200,0.1);
}

.box::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:1px;
    background: linear-gradient(120deg,#00ffd5,#00ff9c,#00ffd5);

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;

    animation: borderRun 3s linear infinite;
}

@keyframes borderRun{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

/* nền glow nhẹ */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle, #00ffd510, transparent 60%);
    pointer-events:none;
}

@keyframes borderRun{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

/* title */
.title{
    font-weight:bold;
    margin-bottom:6px;
    color:#00ffd5;
    text-shadow:0 0 10px #00ffd5;
}

/* buttons */
button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:#00ffd5;
    color:#000;
    font-weight:bold;

    box-shadow:0 0 12px #00ffd5;

    animation: pulse 1.5s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 8px #00ffd5;}
    50%{box-shadow:0 0 20px #00ffd5;}
    100%{box-shadow:0 0 8px #00ffd5;}
}

/* input */
input{
    padding:10px;
    font-size:16px;
    border-radius:10px;
    border:none;
    outline:none;
    margin:6px;
    width:260px;
    background:#111827;
    color:#fff;
    box-shadow:0 0 8px #00ffd5 inset;
}

h2{
    color:#00ffd5;
    text-shadow:
        0 0 10px #00ffd5,
        0 0 20px #00ffd5,
        0 0 40px #00ffd5;
}

/* result colors */
.tai{
    color:#00ff9c;
    text-shadow:0 0 10px #00ff9c;
}
.xiu{
    color:#ff4d4d;
    text-shadow:0 0 10px #ff4d4d;
}

/* fade animation */
.fade{
    animation:fadeIn 0.4s ease;
}
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* progress bar */
.bar{
    height:6px;
    background:#111;
    border-radius:5px;
    overflow:hidden;
    margin-top:3px;
}
.fill{
    height:6px;
    width:0%;
    border-radius:5px;
    transition: width 0.6s ease;
}
.fill{
    height:6px;
    width:0%;
    border-radius:5px;
    transition: width 0.6s ease;
}
.row{
    display:flex;
    gap:10px;
}

.row button{
    flex:1;
}
#out{
    margin-top:6px;
    text-align:center;
    font-size:18px;
}

#sum3, #dice3{
    font-size:18px;
    display:block;
    text-align:center;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="app">

<h2 class="neon">🎰 SICBO AI CASINO</h2>

<input id="md5" placeholder="Nhập MD5...">
<br>
<button onclick="predict()">Dự đoán</button>
<br>
<div class="row">
    <button onclick="train('tai')">TÀI</button>
    <button onclick="train('xiu')">XỈU</button>
</div>
<div class="box">
    <div class="title">📊 Predict</div>
    <div id="out"></div>
</div>

<div class="box">
    <div class="title">🎯 Top Tổng</div>
    <span id="sum3">--</span>
</div>

<div class="box">
    <div class="title">🎲 Xúc xắc</div>
    <span id="dice3">--</span>
</div>

<div class="box">
    <div class="title">📈 Xác suất</div>
    <div id="prob"></div>
</div>

<script>

// ===== Load =====
let history = JSON.parse(localStorage.getItem("sicbo_history")) || [];
let model = {
    even: 1,
    odd: 1,
    high: 1,
    low: 1,
    lastBias: 1
};

let lastFeatures = null;
let lastPrediction = null;
let trend = 0;

// ===== Extract =====
function extract(md5){

    let nums = [];

    for(let i=0;i<md5.length;i+=2){
        let n = parseInt(md5.substr(i,2),16);
        nums.push(n % 6 + 1);
    }

    let sum = nums[0] + nums[1] + nums[2];

    return {
        even: (sum % 2 === 0),
        high: (sum >= 11),
        lastBias: parseInt(md5[31],16) % 2
    };
}

// ===== Predict =====
function predict(){

    let md5 = document.getElementById("md5").value.trim().toLowerCase();

    if(md5.length !== 32){
        alert("MD5 không hợp lệ");
        return;
    }

    // ===== build nums =====
    let nums = [];
    for(let i=0;i<md5.length;i+=2){
        let n = parseInt(md5.substr(i,2),16);
        nums.push(n % 6 + 1);
    }

    // ===== feature =====
    let sum3 = nums[0] + nums[1] + nums[2];

    let f = {
        even: (sum3 % 2 === 0),
        high: (sum3 >= 11),
        lastBias: parseInt(md5[31],16) % 2
    };

    let tai = 0;
    let xiu = 0;

    if(f.even) tai += model.even;
    else xiu += model.odd;

    if(f.high) tai += model.high;
    else xiu += model.low;

    if(model.lastBias > 0.8){
    if(f.lastBias === 0) tai += model.lastBias;
    else xiu += model.lastBias;
}
    
    // ===== apply trend =====
    let t = Math.max(-3, Math.min(3, trend));

    if(t > 0) tai += t * 0.2;
    if(t < 0) xiu += Math.abs(t) * 0.2;
    let result = (tai > xiu) ? "tai" : "xiu";

    lastFeatures = f;
    lastPrediction = result;

    let cls = (result === "tai") ? "tai" : "xiu";

document.getElementById("out").innerHTML =
    "<div class='fade "+cls+"'>" +
    "🎯 " + result.toUpperCase() +
    "</div>" +
    "<small>Tai=" + tai.toFixed(2) +
    " | Xiu=" + xiu.toFixed(2) + "</small>";

    // ===== SUM FREQ =====
    let sumFreq = {};
    for(let i=4;i<=17;i++) sumFreq[i] = 0;

    for(let i=0;i<nums.length-2;i++){
    let s = nums[i] + nums[i+1] + nums[i+2];

    if(s >= 4 && s <= 17 && s !== 3 && s !== 18){
        sumFreq[s]++;
    }
}

    // ===== APPLY WEIGHT =====
    for(let s=4;s<=17;s++){
        let isTai = (s >= 11);

        if(isTai){
            sumFreq[s] *= (model.high + model.even)/2;
        }else{
            sumFreq[s] *= (model.low + model.odd)/2;
        }
    }

    // ===== TOP 3 SUM =====
    let sorted = Object.keys(sumFreq)
    .map(n => ({sum:parseInt(n), val:sumFreq[n]}))
    .sort((a,b)=>b.val-a.val);

// 👉 lọc theo kết quả dự đoán
if(result === "tai"){
    sorted = sorted.filter(x => x.sum >= 11);
}else{
    sorted = sorted.filter(x => x.sum <= 10);
}

let topSum = sorted
    .filter(x => Math.abs(x.sum - sorted[0].sum) <= 3)
    .slice(0,3)
    .map(x=>x.sum);

    document.getElementById("sum3").innerHTML =
        topSum.join(" - ");

// ===== DICE =====
let diceFreq = [0,0,0,0,0,0];

// chỉ lấy 6 giá trị cuối (gần nhất)
for(let j = nums.length - 6; j < nums.length; j++){
    let n = nums[j];
    if(n >= 1 && n <= 6){
        diceFreq[n-1]++;
    }
}

    for(let i=0;i<6;i++){
        if(i+1 >= 4) diceFreq[i] *= model.high;
        else diceFreq[i] *= model.low;
    }

    let diceTop = diceFreq
        .map((v,i)=>({num:i+1,val:v}))
        .sort((a,b)=>b.val-a.val)
        .slice(0,3)
        .map(x=>x.num);

let dice = generateDiceFromSum(topSum[0] || 11);

document.getElementById("dice3").innerHTML =
    dice.join(" - ");

    // ===== PROBABILITY =====
    let total = 0;

for(let s=4;s<=17;s++){

    if(result === "tai" && s < 11) continue;
    if(result === "xiu" && s > 10) continue;

    total += sumFreq[s];
}

    let probArr = [];

    for(let s=4;s<=17;s++){

    // 👉 lọc theo kết quả dự đoán
    if(result === "tai" && s < 11) continue;
    if(result === "xiu" && s > 10) continue;

    let val = sumFreq[s];
    let percent = total ? ((val + 1) / (total + 14) * 100) : 0;

    probArr.push({
        sum: s,
        p: percent
    });
}
    

probArr.sort((a,b)=>b.p-a.p);

let best = probArr[0];

if(best.p < 14){
    document.getElementById("out").innerHTML +=
        "<br>⚠️ Kèo yếu - bỏ qua";
}

let html = "";

probArr.forEach((x,i)=>{

    let color = "#888";
    let icon = "";

    if(i === 0){
        icon = "🔥 ";
        color = "#00ff9c";
    }else if(i < 3){
        icon = "⭐ ";
        color = "#ffd700";
    }

    html += `
    <div style="margin:6px 0">
        ${icon}Tổng ${x.sum}: ${x.p.toFixed(1)}%
        <div class="bar">
            <div class="fill" style="background:${color}" data-p="${x.p}"></div>
        </div>
    </div>
    `;
});

document.getElementById("prob").innerHTML = html;

requestAnimationFrame(()=>{
    document.querySelectorAll(".fill").forEach(el=>{
        el.style.width = el.dataset.p + "%";
    });
},50);

document.querySelectorAll(".box").forEach(b=>{
    b.classList.remove("fade");
    void b.offsetWidth;
    b.classList.add("fade");
    });
}


// ===== Re-train từ history =====
function rebuildModel(){

    model = {
        even: 1,
        odd: 1,
        high: 1,
        low: 1,
        lastBias: 1
    };

    let lr = 0.2 + history.length * 0.05;

    history.forEach(item => {

        let f = item.features;
        let real = item.real;

        let tai = 0;
        let xiu = 0;

        if(f.even) tai += model.even;
        else xiu += model.odd;

        if(f.high) tai += model.high;
        else xiu += model.low;

        let pred = (tai > xiu) ? "tai" : "xiu";
        let correct = (pred === real);

        function update(cond, key){
            if(cond){
                if(correct) model[key] += lr;
                else model[key] -= lr;
            }
        }

        update(f.even, "even");
        update(!f.even, "odd");
        update(f.high, "high");
        update(!f.high, "low");

        for(let k in model){
            if(model[k] < 0.1) model[k] = 0.1;
        }
        // giới hạn max tránh overfit
for(let k in model){
    if(model[k] > 2) model[k] = 2;
}
    });

    // ===== trend =====
    trend = 0;
    history.forEach(h=>{
        if(h.real === "tai") trend++;
        else trend--;
    });

    // ===== normalize =====
    let sumW = model.even + model.odd + model.high + model.low;

    for(let k in model){
        model[k] = model[k] / sumW * 4;
    }
}

function generateDiceFromSum(target){
    let res = [];

    for(let a=1;a<=6;a++){
        for(let b=1;b<=6;b++){
            for(let c=1;c<=6;c++){
                if(a+b+c === target){
                    res.push([a,b,c]);
                }
            }
        }
    }

    return res[Math.floor(Math.random()*res.length)];
}

// ===== Train =====
function train(real){

    if(!lastFeatures) return;

    // lưu vào history
    history.push({
    features: lastFeatures,
    real: real,
    pred: lastPrediction
});

if(history.length > 10){
    history.shift();
}

rebuildModel();

localStorage.setItem("sicbo_history", JSON.stringify(history));

// ===== WINRATE =====
let win = 0;

history.forEach(h=>{
    if(h.pred === h.real) win++;
});

let rate = history.length ? (win/history.length*100).toFixed(1) : 0;

// ===== UI =====
document.getElementById("out").innerHTML =
    "Đã học | Winrate=" + rate + "%" +
    " | History=" + history.length +
    " | Model=" + JSON.stringify(model);
}

</script>

</body>
</html>
