<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baccarat AI Fixed Logic</title>
    <style>
        :root { --banker: #e63946; --player: #0077b6; --tie: #2a9d8f; --bg: #111; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #board-container { background: #fff; width: 100%; max-width: 800px; height: 186px; overflow-x: auto; display: flex; border: 2px solid #444; margin-bottom: 15px; border-radius: 4px; }
        .column { display: flex; flex-direction: column; min-width: 30px; border-right: 1px solid #eee; }
        .cell { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eee; position: relative; }
        .dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }
        .B { background: var(--banker); }
        .P { background: var(--player); }
        .tie-line { position: absolute; width: 100%; height: 100%; background: linear-gradient(45deg, transparent 46%, var(--tie) 46%, var(--tie) 54%, transparent 54%); z-index: 2; }
        .tie-val { position: absolute; color: #000; font-size: 9px; font-weight: bold; z-index: 3; right: 1px; bottom: 1px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; max-width: 400px; }
        button { padding: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; }
        .btn-p { background: var(--player); }
        .btn-b { background: var(--banker); }
        .btn-t { background: var(--tie); }
        .btn-reset { grid-column: span 3; background: #333; margin-top: 5px; }
        #predict-box { width: 100%; max-width: 400px; padding: 15px; border-radius: 12px; background: #222; margin-top: 15px; text-align: center; border: 1px solid #444; }
        .next-move { font-size: 22px; font-weight: bold; margin: 10px 0; padding: 8px; border-radius: 6px; }
        .p-style { color: #00b4d8; border: 2px solid var(--player); }
        .b-style { color: #ff4d4d; border: 2px solid var(--banker); }
        .reason { font-size: 13px; color: #aaa; min-height: 38px; }
        .badge { font-size: 11px; background: #444; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

    <h4 style="margin: 10px 0;">BACCARAT AI - LOGIC RE-FIXED</h4>

    <div id="board-container"></div>

    <div class="controls">
        <button class="btn-p" onclick="record('P')">PLAYER</button>
        <button class="btn-b" onclick="record('B')">BANKER</button>
        <button class="btn-t" onclick="record('T')">TIE</button>
        <button onclick="undo()" style="background:#f4a261;">XÓA 1</button>
        <button class="btn-reset" onclick="resetAll()">XÓA DỮ LIỆU</button>
    </div>

    <div id="predict-box">
        <div id="current-pattern" class="badge">ĐANG DÒ CẦU...</div>
        <div style="font-size: 11px; color: #888;">DỰ ĐOÁN TIẾP THEO</div>
        <div id="next-bet" class="next-move">---</div>
        <div id="reason" class="reason">Cần thêm dữ liệu kết quả thực tế.</div>
    </div>

<script>
    let history = []; 
    let pattern = "NONE";

    function record(type) {
        if (type === 'T') {
            if (history.length === 0) return;
            let last = history[history.length - 1];
            if (last.type === 'T') last.count++;
            else history.push({type: 'T', count: 1});
        } else {
            history.push({type: type});
        }
        render();
        logic();
    }

function undo(){

if(history.length===0) return;

history.pop();

render();

logic();

}

function detectPattern(h){

const n = h.length;

let last = h[n-1];
let p1 = h[n-2];
let p2 = h[n-3];
let p3 = h[n-4];
let p4 = h[n-5];
let p5 = h[n-6];


// 1 BỆT
if(last===p1 && p1===p2)
return {pattern:"BET",pred:last,msg:"Cầu bệt"};



// 2 BỆT DÀI
if(n>=4 && last===p1 && p1===p2 && p2===p3)
return {pattern:"LONG BET",pred:last,msg:"Bệt dài"};



// 3 1-1
if(n>=3 && last!==p1 && p1!==p2)
return {pattern:"1-1",pred:last==="P"?"B":"P",msg:"Cầu nhảy"};



// 4 2-2
if(n>=3 && last!==p1 && p1===p2)
return {pattern:"2-2",pred:last,msg:"Cầu đôi"};


// 5 3-1
if(n>=4 && last===p1 && p1===p2 && p3!==p2)
return {pattern:"3-1",pred:last==="P"?"B":"P",msg:"3-1 đảo"};



// 6 3-3
if(n>=6 &&
h[n-1]===h[n-2] &&
h[n-2]===h[n-3] &&
h[n-4]===h[n-5] &&
h[n-5]===h[n-6])
return {pattern:"3-3",pred:last,msg:"Chu kỳ 3"};



// 7 1-2
if(n>=3 && last===p1 && p2!==p1)
return {pattern:"1-2",pred:last==="P"?"B":"P",msg:"1-2"};



// 8 2-1
if(n>=3 && last!==p1 && p1===p2)
return {pattern:"2-1",pred:last,msg:"2-1"};


// 9 ZigZag
if(n>=4 && last!==p1 && p1===p2 && p2!==p3)
return {pattern:"ZIGZAG",pred:p1,msg:"zigzag"};



// 10 đảo sau bệt
if(n>=4 && last===p1 && p1===p2 && p2===p3)
return {pattern:"BET BREAK",pred:last==="P"?"B":"P",msg:"bệt sắp gãy"};



// 11 pingpong dài
if(n>=5 && h[n-1]!==h[n-2] && h[n-2]!==h[n-3] && h[n-3]!==h[n-4])
return {pattern:"PINGPONG",pred:last==="P"?"B":"P",msg:"nhảy liên tục"};



// 12 4-4
if(n>=8 &&
h[n-1]===h[n-2] &&
h[n-2]===h[n-3] &&
h[n-3]===h[n-4] &&
h[n-5]===h[n-6] &&
h[n-6]===h[n-7] &&
h[n-7]===h[n-8])
return {pattern:"4-4",pred:last,msg:"chu kỳ 4"};



// 13 5 bệt
if(n>=5 && last===p1 && p1===p2 && p2===p3 && p3===p4)
return {pattern:"5BET",pred:last,msg:"bệt 5"};



// 14 đảo sau 5
if(n>=5 && last===p1 && p1===p2 && p2===p3 && p3===p4)
return {pattern:"BREAK5",pred:last==="P"?"B":"P",msg:"sắp đảo"};



// 15 thống kê tổng
let pCount = h.filter(x=>x==="P").length;
let bCount = h.filter(x=>x==="B").length;

return {
pattern:"STATS",
pred:pCount>bCount?"P":"B",
msg:"AI thống kê"
};

}

function logic(){

const h = history.filter(x => x.type !== 'T').map(x => x.type);

const nextBet=document.getElementById('next-bet');
const reason=document.getElementById('reason');
const badge=document.getElementById('current-pattern');

if(h.length<2) return;

const result = detectPattern(h);

pattern = result.pattern;

let pred = result.pred;

badge.innerText="TRẠNG THÁI: "+pattern;

nextBet.innerText = pred==="P" ? "PLAYER":"BANKER";

nextBet.className=`next-move ${pred==="P"?"p-style":"b-style"}`;

reason.innerText=result.msg;

}


// =================
// HIỂN THỊ
// =================

badge.innerText="TRẠNG THÁI: "+(pattern==="NONE"?"DÒ CẦU":pattern);

nextBet.innerText = pred==="P" ? "PLAYER":"BANKER";

nextBet.className=`next-move ${pred==="P" ? "p-style":"b-style"}`;

reason.innerText=msg;

}

    function render() {
        const container = document.getElementById('board-container');
        container.innerHTML = '';
        let columns = [];
        let cur = [];
        let lastS = null;

        history.forEach(item => {
            if (item.type !== 'T') {
                if (item.type !== lastS) {
                    if (cur.length > 0) columns.push(cur);
                    cur = [{side: item.type, ties: 0}];
                    lastS = item.type;
                } else {
                    cur.push({side: item.type, ties: 0});
                }
            } else if (cur.length > 0) {
                cur[cur.length - 1].ties += item.count;
            }
        });
        if (cur.length > 0) columns.push(cur);

        columns.forEach(col => {
            let colDiv = document.createElement('div');
            colDiv.className = 'column';
            for (let i = 0; i < 6; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                if (col[i]) {
                    let dot = document.createElement('div');
                    dot.className = `dot ${col[i].side}`;
                    dot.innerText = col[i].side;
                    if (col[i].ties > 0) {
                        let line = document.createElement('div');
                        line.className = 'tie-line';
                        cell.appendChild(line);
                        if (col[i].ties > 1) {
                            let v = document.createElement('div');
                            v.className = 'tie-val';
                            v.innerText = col[i].ties;
                            cell.appendChild(v);
                        }
                    }
                    cell.appendChild(dot);
                }
                colDiv.appendChild(cell);
            }
            container.appendChild(colDiv);
        });
        container.scrollLeft = container.scrollWidth;
    }

    function resetAll() {
        history = []; pattern = "NONE"; render();
        document.getElementById('next-bet').innerText = "---";
        document.getElementById('next-bet').className = "next-move";
        document.getElementById('reason').innerText = "Đã xóa dữ liệu.";
        document.getElementById('current-pattern').innerText = "ĐANG DÒ CẦU...";
    }
</script>
</body>
</html>
