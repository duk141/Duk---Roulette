<<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sicbo AI Learning</title>

<style>
body{
    background:#0b0f1a;
    color:#fff;
    font-family:Arial;
    text-align:center;
}
input,button{
    padding:10px;
    font-size:18px;
    margin:5px;
}
</style>
</head>

<body>

<h2>SICBO AI LEARNING</h2>

<input id="md5" placeholder="MD5 32 ký tự">
<br>
<button onclick="predict()">Dự đoán</button>
<br>
<button onclick="train('tai')">Kết quả TÀI</button>
<button onclick="train('xiu')">Kết quả XỈU</button>

<div id="out"></div>

<script>

// ===== Load =====
let history = JSON.parse(localStorage.getItem("sicbo_history")) || [];
let model = {
    even: 1,
    odd: 1,
    high: 1,
    low: 1,
    lastBias: 1
};

let lastFeatures = null;
let lastPrediction = null;

// ===== Extract =====
function extract(md5){

    let nums = [];

    for(let i=0;i<md5.length;i+=2){
        let n = parseInt(md5.substr(i,2),16);
        nums.push(n % 6 + 1);
    }

    let sum = nums[0] + nums[1] + nums[2];

    return {
        even: (sum % 2 === 0),
        high: (sum >= 11),
        lastBias: parseInt(md5[31],16) % 2
    };
}

// ===== Predict =====
function predict(){

    let md5 = document.getElementById("md5").value.trim().toLowerCase();

    if(md5.length !== 32){
        alert("MD5 không hợp lệ");
        return;
    }

    let f = extract(md5);

    let tai = 0;
    let xiu = 0;

    if(f.even) tai += model.even;
    else xiu += model.odd;

    if(f.high) tai += model.high;
    else xiu += model.low;

    if(f.lastBias === 0) tai += model.lastBias;
    else xiu += model.lastBias;

    let result = (tai > xiu) ? "tai" : "xiu";

    lastFeatures = f;
    lastPrediction = result;

    document.getElementById("out").innerHTML =
        "Predict: " + result.toUpperCase() +
        " | Tai=" + tai.toFixed(2) +
        " Xiu=" + xiu.toFixed(2);
}

// ===== Re-train từ history =====
function rebuildModel(){

    // reset model
    model = {
        even: 1,
        odd: 1,
        high: 1,
        low: 1,
        lastBias: 1
    };

    let lr = 0.3;

    history.forEach(item => {

        let f = item.features;
        let real = item.real;

        let tai = 0;
        let xiu = 0;

        if(f.even) tai += model.even;
        else xiu += model.odd;

        if(f.high) tai += model.high;
        else xiu += model.low;

        if(f.lastBias === 0) tai += model.lastBias;
        else xiu += model.lastBias;

        let pred = (tai > xiu) ? "tai" : "xiu";

        let correct = (pred === real);

        function update(cond, key){
            if(cond){
                if(correct) model[key] += lr;
                else model[key] -= lr;
            }
        }

        update(f.even, "even");
        update(!f.even, "odd");
        update(f.high, "high");
        update(!f.high, "low");

        // giữ weight dương
        for(let k in model){
            if(model[k] < 0.1) model[k] = 0.1;
        }

    });
}

// ===== Train =====
function train(real){

    if(!lastFeatures) return;

    // lưu vào history
    history.push({
        features: lastFeatures,
        real: real
    });

    // chỉ giữ 5 phiên
    if(history.length > 5){
        history.shift();
    }

    // rebuild model từ 5 phiên
    rebuildModel();

    localStorage.setItem("sicbo_history", JSON.stringify(history));

    document.getElementById("out").innerHTML =
        "Đã học | History=" + history.length +
        " | Model=" + JSON.stringify(model);
}

</script>

</body>
</html>
