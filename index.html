<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HILO AI PRO</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>
</head>

<body>

<h2>HILO AI PRO</h2>

<div class="panel">

<button onclick="add('H')">HIGH</button>
<button onclick="add('L')">LOW</button>
<button onclick="skip()">SKIP</button>
<button onclick="paste()">PASTE</button>
<input type="file" id="img">
<button onclick="scan()">SCAN IMAGE</button>
<button onclick="reset()">RESET</button>

</div>

<div class="dashboard">

<div class="box">
<h3>History</h3>
<div id="history"></div>
</div>

<div class="box">
<h3>Pattern</h3>
<div id="pattern"></div>
</div>

<div class="box">
<h3>AI Prediction</h3>
<div id="predict"></div>
</div>

<div class="box">
<h3>Trend</h3>
<div id="trend"></div>
</div>

<div class="box">
<h3>Big Road</h3>
<div id="bigroad"></div>
</div>

<div class="box">
<h3>Small Road</h3>
<div id="smallroad"></div>
</div>

<div class="box">
<h3>Heatmap</h3>
<div id="heatmap"></div>
</div>

<div class="box">
<canvas id="chart"></canvas>
</div>

</div>

<script src="main.js"></script>
<script src="pattern.js"></script>
<script src="ai.js"></script>
<script src="roadmap.js"></script>
<script src="heatmap.js"></script>
<script src="chart.js"></script>
<script src="capture.js"></script>
  
</body>

</html>
