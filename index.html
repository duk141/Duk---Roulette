<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HILO AI PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

button{
padding:12px 18px;
font-size:18px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.high{background:#16a34a}
.low{background:#2563eb}
.reset{background:#dc2626}
.clip{background:#9333ea}

.box{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:15px;
}

#history{
font-size:18px;
word-wrap:break-word;
}

#predict{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.cell{
display:inline-block;
width:18px;
height:18px;
margin:2px;
border-radius:4px;
}

.h{background:#16a34a}
.l{background:#2563eb}

</style>

</head>

<body>

<h2>HILO AI PRO</h2>

<button class="high" onclick="add('H')">HIGH</button>
<button class="low" onclick="add('L')">LOW</button>
<button class="clip" onclick="paste()">PASTE</button>
<button class="reset" onclick="reset()">RESET</button>

<div class="box">
<div id="history"></div>
</div>

<div class="box">
<div id="pattern"></div>
<div id="percent"></div>
<div id="trend"></div>
</div>

<div class="box">
<div id="predict"></div>
</div>

<div class="box">
<div id="heatmap"></div>
</div>

<div class="box">
<canvas id="chart"></canvas>
</div>

<script>

let history=[];
let chart;

function add(v){

history.push(v);

update();

}

function reset(){

history=[];

update();

}

async function paste(){

let text=await navigator.clipboard.readText();

text=text.replace(/[^HL]/g,'');

history=text.split('');

update();

}

function update(){

showHistory();
percent();
pattern();
trend();
predict();
heatmap();
chartUpdate();

}

function showHistory(){

document.getElementById("history").innerHTML=
"History: "+history.join(" ");

}

function percent(){

let h=history.filter(x=>x=="H").length;

let l=history.filter(x=>x=="L").length;

let t=history.length;

if(t==0)return;

let ph=(h/t*100).toFixed(1);
let pl=(l/t*100).toFixed(1);

document.getElementById("percent").innerHTML=
"High "+ph+"% | Low "+pl+"%";

}

function trend(){

let last=history.slice(-10);

let h=last.filter(x=>x=="H").length;

let l=last.filter(x=>x=="L").length;

let t="Sideway";

if(h>l) t="Trend High";
if(l>h) t="Trend Low";

document.getElementById("trend").innerHTML="Trend: "+t;

}

function pattern(){

let s=history.join("");

let p="Hỗn loạn";

if(/H{6,}/.test(s)) p="Cầu bệt High";
else if(/L{6,}/.test(s)) p="Cầu bệt Low";
else if(/(HL){4,}/.test(s)) p="Cầu 1-1";
else if(/HHLLHHLL/.test(s)) p="Cầu 2-2";
else if(/HHHLLL/.test(s)) p="Cầu 3-3";
else if(/HHHHLL/.test(s)) p="Cầu 4-2";
else if(/LLHHLL/.test(s)) p="Cầu đảo";
else if(/HLH/.test(s)) p="Cầu zigzag";
else if(/HHHL/.test(s)) p="Gãy High";
else if(/LLLH/.test(s)) p="Gãy Low";

document.getElementById("pattern").innerHTML=
"Pattern: "+p;

}

function predict(){

if(history.length<5)return;

let m={
H:{H:0,L:0},
L:{H:0,L:0}
};

for(let i=0;i<history.length-1;i++){

let a=history[i];
let b=history[i+1];

m[a][b]++;

}

let last=history[history.length-1];

let h=m[last].H;
let l=m[last].L;

let signal="--";

if(h>l) signal="HIGH";
if(l>h) signal="LOW";

document.getElementById("predict").innerHTML=
"AI Prediction: "+signal;

}

function heatmap(){

let html="";

history.forEach(x=>{

if(x=="H")
html+='<div class="cell h"></div>';
else
html+='<div class="cell l"></div>';

});

document.getElementById("heatmap").innerHTML=html;

}

function chartUpdate(){

let h=history.filter(x=>x=="H").length;
let l=history.filter(x=>x=="L").length;

if(!chart){

chart=new Chart(

document.getElementById("chart"),

{
type:'pie',

data:{
labels:['High','Low'],
datasets:[{
data:[h,l]
}]
}

});

}else{

chart.data.datasets[0].data=[h,l];

chart.update();

}

}

</script>

</body>

</html>
