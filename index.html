<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baccarat AI PRO</title>

<style>

:root{
--banker:#e63946;
--player:#0077b6;
--tie:#2a9d8f;
--bg:#111;
}

body{
font-family:Arial;
background:var(--bg);
color:white;
text-align:center;
}

h3{margin-top:10px;}

#board-container{
background:#fff;
height:180px;
display:flex;
overflow-x:auto;
border:2px solid #444;
margin:10px auto;
width:90%;
}

.column{
display:flex;
flex-direction:column;
min-width:30px;
}

.cell{
width:30px;
height:30px;
border:1px solid #eee;
display:flex;
align-items:center;
justify-content:center;
}

.dot{
width:22px;
height:22px;
border-radius:50%;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
}

.B{background:var(--banker);}
.P{background:var(--player);}

.controls{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:5px;
width:300px;
margin:auto;
}

button{
padding:12px;
border:none;
border-radius:5px;
font-weight:bold;
color:white;
}

.btn-p{background:var(--player);}
.btn-b{background:var(--banker);}
.btn-t{background:var(--tie);}
.btn-u{background:#f4a261;}
.btn-r{background:#333;}

#predict{
background:#222;
padding:10px;
width:300px;
margin:10px auto;
border-radius:8px;
}

.next{
font-size:22px;
font-weight:bold;
}

#roads{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

.road{
background:#fff;
width:120px;
height:120px;
display:flex;
flex-wrap:wrap;
}

.road-dot{
width:10px;
height:10px;
margin:1px;
border-radius:50%;
}

.red{background:red;}
.blue{background:blue;}

#heatmap{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:3px;
width:200px;
margin:auto;
margin-top:10px;
}

.heat{
height:15px;
background:#444;
}

</style>
</head>

<body>

<h3>BACCARAT AI PRO</h3>

<div id="board-container"></div>

<div class="controls">

<button class="btn-p" onclick="record('P')">PLAYER</button>
<button class="btn-b" onclick="record('B')">BANKER</button>
<button class="btn-t" onclick="record('T')">TIE</button>

<button class="btn-u" onclick="undo()">UNDO</button>
<button class="btn-r" onclick="resetAll()">RESET</button>

</div>

<div id="predict">

<div id="pattern">ĐANG DÒ CẦU</div>

<div class="next" id="nextBet">---</div>

<div id="reason"></div>

</div>

<div id="roads">

<div>
<h4>BigEye</h4>
<div id="bigeye" class="road"></div>
</div>

<div>
<h4>Small</h4>
<div id="smallroad" class="road"></div>
</div>

<div>
<h4>Cockroach</h4>
<div id="cockroach" class="road"></div>
</div>

</div>

<h4>Heatmap</h4>
<div id="heatmap"></div>

<script>

let history=[];
let pattern="NONE";

function record(type){

if(type==="T"){

if(history.length===0) return;

let last=history[history.length-1];

if(last.type==="T") last.count++;

else history.push({type:"T",count:1});

}

else{

history.push({type:type});

}

render();
logic();
calcRoads();
heatmap();

}

function undo(){

if(history.length===0) return;

let last=history[history.length-1];

if(last.type==="T" && last.count>1){

last.count--;

}

else{

history.pop();

}

render();
logic();
calcRoads();
heatmap();

}

function resetAll(){

history=[];
pattern="NONE";

render();

document.getElementById("nextBet").innerText="---";

}

function logic(){

const h=history.filter(x=>x.type!=="T").map(x=>x.type);

const n=h.length;

if(n<2) return;

let last=h[n-1];
let p1=h[n-2];
let p2=h[n-3];
let p3=h[n-4];

let pred="";
let msg="";

// bệt
if(last===p1 && p1===p2){

pattern="BET";

pred=last;

msg="Cầu bệt";

}

// 1-1
else if(n>=3 && last!==p1 && p1!==p2){

pattern="1-1";

pred=last==="P"?"B":"P";

msg="Cầu 1-1";

}

// 2-2
else if(n>=3 && last!==p1 && p1===p2){

pattern="2-2";

pred=last;

msg="Cầu 2-2";

}

// AI Markov
else{

let pb=0;
let bp=0;

for(let i=1;i<h.length;i++){

if(h[i-1]=="P" && h[i]=="B") pb++;

if(h[i-1]=="B" && h[i]=="P") bp++;

}

if(pb>bp){

pred="B";
msg="AI Markov P→B";

}

else if(bp>pb){

pred="P";
msg="AI Markov B→P";

}

else{

let pCount=h.filter(x=>x==="P").length;
let bCount=h.filter(x=>x==="B").length;

pred=pCount>bCount?"P":"B";

msg="AI thống kê";

}

pattern="AI";

}

// xác suất %

let total=h.length;

let pCount=h.filter(x=>x==="P").length;

let bCount=h.filter(x=>x==="B").length;

let pProb=Math.round((pCount/total)*100);

let bProb=Math.round((bCount/total)*100);

document.getElementById("pattern").innerText="TRẠNG THÁI: "+pattern;

document.getElementById("nextBet").innerText=pred==="P"?"PLAYER":"BANKER";

document.getElementById("reason").innerText=msg+" | P:"+pProb+"% B:"+bProb+"%";

}

function render(){

const container=document.getElementById("board-container");

container.innerHTML="";

let columns=[];
let cur=[];
let lastS=null;

history.forEach(item=>{

if(item.type!=="T"){

if(item.type!==lastS){

if(cur.length>0) columns.push(cur);

cur=[{side:item.type}];

lastS=item.type;

}

else{

cur.push({side:item.type});

}

}

});

if(cur.length>0) columns.push(cur);

columns.forEach(col=>{

let colDiv=document.createElement("div");

colDiv.className="column";

for(let i=0;i<6;i++){

let cell=document.createElement("div");

cell.className="cell";

if(col[i]){

let dot=document.createElement("div");

dot.className="dot "+col[i].side;

dot.innerText=col[i].side;

cell.appendChild(dot);

}

colDiv.appendChild(cell);

}

container.appendChild(colDiv);

});

}

function calcRoads(){

const h=history.filter(x=>x.type!=="T").map(x=>x.type);

let bigeye=[];
let small=[];
let cockroach=[];

for(let i=2;i<h.length;i++){

bigeye.push(h[i]===h[i-2]?"R":"B");

}

for(let i=3;i<h.length;i++){

small.push(h[i]===h[i-3]?"R":"B");

}

for(let i=4;i<h.length;i++){

cockroach.push(h[i]===h[i-4]?"R":"B");

}

renderRoad("bigeye",bigeye);

renderRoad("smallroad",small);

renderRoad("cockroach",cockroach);

}

function renderRoad(id,data){

const el=document.getElementById(id);

el.innerHTML="";

data.forEach(d=>{

let dot=document.createElement("div");

dot.className="road-dot "+(d==="R"?"red":"blue");

el.appendChild(dot);

});

}

function heatmap(){

const h=history.filter(x=>x.type!=="T").map(x=>x.type);

const map=document.getElementById("heatmap");

map.innerHTML="";

let pCount=h.filter(x=>x==="P").length;

let bCount=h.filter(x=>x==="B").length;

for(let i=0;i<20;i++){

let cell=document.createElement("div");

cell.className="heat";

let val=Math.random();

cell.style.opacity=val;

map.appendChild(cell);

}

}

</script>

</body>
</html>
